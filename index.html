function QR({value="",size=96}){
  const seed=Math.abs([...value].reduce((h,c)=>(Math.imul(31,h)+c.charCodeAt(0))|0,0));
  const g=21;const cell=size/g;const cells=[];
  const fB=(r,c)=>{const b=(ro,co,or,oc)=>ro>=or&&ro<=or+6&&co>=oc&&co<=oc+6&&(ro===or||ro===or+6||co===oc||co===oc+6);return b(r,c,0,0)||b(r,c,0,g-7)||b(r,c,g-7,0);};
  const fI=(r,c)=>{const b=(ro,co,or,oc)=>ro>=or+2&&ro<=or+4&&co>=oc+2&&co<=oc+4;return b(r,c,0,0)||b(r,c,0,g-7)||b(r,c,g-7,0);};
  const fO=(r,c)=>(r<=6&&c<=6)||(r<=6&&c>=g-7)||(r>=g-7&&c<=6);
  for(let r=0;r<g;r++)for(let c=0;c<g;c++){
    const dark=fB(r,c)||fI(r,c)||(!fO(r,c)&&(((seed>>((r*g+c)%29))&1)^((seed>>((r*g+c)%13))&1)^(r%3===0?1:0)));
    if(dark)cells.push({r,c});
  }
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{borderRadius:8,display:"block"}}>
      <rect width={size} height={size} fill="white" rx="6"/>
      {cells.map(({r,c})=><rect key={`${r}-${c}`} x={c*cell} y={r*cell} width={cell-0.3} height={cell-0.3} fill={C.dark} rx={cell*0.12}/>)}
    </svg>
  );
}

function BagCarousel(){
  const [active,setActive]=useState(0);
  const [animating,setAnimating]=useState(false);
  useEffect(()=>{
    const t=setInterval(()=>{
      setAnimating(true);
      setTimeout(()=>{setActive(p=>(p+1)%BAG_SLIDES.length);setAnimating(false);},400);
    },3800);
    return()=>clearInterval(t);
  },[]);
  const slide=BAG_SLIDES[active];
  return(
    <div style={{position:"relative",width:"100%",overflow:"hidden",background:`linear-gradient(135deg,${C.navy}ee,${C.green}cc)`,zIndex:1}}>
      {/* Background image with crossfade */}
      <div style={{position:"absolute",inset:0,backgroundImage:`url('${slide.img}')`,backgroundSize:"cover",backgroundPosition:"center",transition:"opacity 0.5s ease",opacity:animating?0:1,filter:"brightness(0.35) saturate(1.2)"}}/>
      {/* Green + navy overlay */}
      <div style={{position:"absolute",inset:0,background:`linear-gradient(160deg,${C.navy}99 0%,${C.green}66 50%,${C.navy}99 100%)`}}/>
      <div style={{position:"relative",zIndex:2,maxWidth:1080,margin:"0 auto",padding:"42px 24px",display:"grid",gridTemplateColumns:"1fr auto",gap:32,alignItems:"center",flexWrap:"wrap"}}>
        {/* Left: slide info */}
        <div style={{color:"#fff",opacity:animating?0:1,transition:"opacity 0.4s ease"}}>
          <div style={{fontSize:11,fontWeight:800,letterSpacing:3,color:C.goldBright,marginBottom:10}}>✦ RECENTLY AUTHENTICATED</div>
          <div style={{fontSize:"clamp(22px,4vw,36px)",fontWeight:900,lineHeight:1.15,marginBottom:8,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{slide.brand}</div>
          <div style={{fontSize:16,color:"rgba(255,255,255,0.8)",marginBottom:16,fontWeight:600}}>{slide.model}</div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{background:C.green,borderRadius:30,padding:"6px 18px",fontWeight:900,fontSize:14,color:"#fff",border:`1.5px solid ${C.green}`,letterSpacing:0.5}}>✓ {slide.result}</div>
            <div style={{background:"rgba(255,255,255,0.12)",borderRadius:30,padding:"6px 18px",fontWeight:800,fontSize:14,color:C.goldBright,border:`1.5px solid ${C.goldBright}44`}}>{slide.score}% Authentic</div>
          </div>
        </div>
        {/* Right: dot indicators + arrows */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {BAG_SLIDES.map((_,i)=>(
              <button key={i} onClick={()=>{setAnimating(true);setTimeout(()=>{setActive(i);setAnimating(false);},350);}} style={{width:i===active?10:6,height:i===active?28:14,borderRadius:30,background:i===active?C.goldBright:"rgba(255,255,255,0.35)",border:"none",cursor:"pointer",transition:"all 0.3s",padding:0}}/>
            ))}
          </div>
        </div>
      </div>
      {/* Thumbnail strip */}
      <div style={{position:"relative",zIndex:2,display:"flex",gap:0,justifyContent:"center",padding:"0 0 12px"}}>
        {BAG_SLIDES.map((s,i)=>(
          <button key={i} onClick={()=>{setAnimating(true);setTimeout(()=>{setActive(i);setAnimating(false);},350);}} style={{width:`${100/BAG_SLIDES.length}%`,height:56,backgroundImage:`url('${s.img}')`,backgroundSize:"cover",backgroundPosition:"center",border:"none",cursor:"pointer",opacity:i===active?1:0.45,transition:"opacity 0.3s",borderBottom:i===active?`3px solid ${C.goldBright}`:"3px solid transparent",filter:i===active?"brightness(1)":"brightness(0.6)"}}>
          </button>
        ))}
      </div>
    </div>
  );
}
